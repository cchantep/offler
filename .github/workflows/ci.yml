name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cross-version compile
        run: sbt +compile

      - name: Cross-version tests
        run: sbt +testOnly
