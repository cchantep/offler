name: CI

on:
  push:
    branches: master
  pull_request:
    branches: master
  merge_group:

jobs:
  build_n_test:
    name: 'Build & Test'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Set up JDK 1.8'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: 'Setup sbt launcher'
        uses: sbt/setup-sbt@v1

      - name: 'Coursier cache'
        uses: coursier/cache-action@v6
        with:
          extraKey: ${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/build.properties') }}

      - name: 'Compile'
        run: sbt -J-Dscalafix.disable=true +compile

      - name: 'Check code quality'
        run: |
          sbt ';warn ;scalafmtCheckAll'

      - name: 'Run tests'
        run: sbt +testOnly
