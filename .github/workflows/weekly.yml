on:
  schedule:
    - cron: '0 12 * * 0'
name: weekly
permissions:
  contents: write
  pull-requests: write
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    name: 'Launch Scala Steward'
    steps:
      - name: 'Launch Scala Steward'
        uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branches: 'master'
